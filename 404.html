<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNXHub - 404</title>

<link href="https://fonts.googleapis.com/css2?family=Bacasime+Antique&display=swap" rel="stylesheet">

<style>
:root {
    --main: #21221d;
    --accent: #b9c29d;
    --outline: #34362d;
    --bg: #121310;
    --text: #e6e6e6;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Bacasime Antique', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(33,34,29,0.9) 0%, var(--bg) 60%);
    z-index: -1;
}

body::after {
    content: "";
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 1px, transparent 1px, transparent 24px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 1px, transparent 1px, transparent 24px);
    z-index: -1;
    pointer-events: none;
    animation: gridDrift 40s linear infinite;
}

@keyframes gridDrift {
    from { transform: translate(0, 0); }
    to { transform: translate(24px, 24px); }
}

.topbar-wrap {
    position: fixed;
    top: 14px;
    left: 0;
    right: 0;
    width: min(980px, calc(100vw - 24px));
    margin: 0 auto;
    z-index: 10;
    background: rgba(33, 34, 29, 0.45);
    border: 1px solid rgba(52, 54, 45, 0.35);
    border-radius: 16px;
    backdrop-filter: blur(40px) saturate(1.3);
    -webkit-backdrop-filter: blur(40px) saturate(1.3);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.22);
}

.topbar {
    width: 100%;
    height: 56px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.topbar.open {
    height: 110px;
}

.topbar-row {
    height: 56px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
    font-size: 19px;
    letter-spacing: 0.6px;
    line-height: 1;
}

.brand img {
    width: 30px;
    height: 30px;
    object-fit: cover;
    display: block;
    border-radius: 7px;
}

.menu-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 10px;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: background 0.2s ease;
}

.menu-btn:hover {
    background: rgba(255, 255, 255, 0.06);
}

.menu-btn span {
    position: relative;
    width: 18px;
    height: 2px;
    background: var(--text);
    border-radius: 999px;
    display: block;
    transition: transform 0.25s ease, background 0.25s ease;
}

.menu-btn span::before,
.menu-btn span::after {
    content: "";
    position: absolute;
    left: 0;
    width: 18px;
    height: 2px;
    background: var(--text);
    border-radius: 999px;
    transition: transform 0.25s ease, top 0.25s ease, opacity 0.2s ease;
}

.menu-btn span::before { top: -6px; }
.menu-btn span::after  { top: 6px;  }

.menu-btn.open span {
    background: transparent;
}

.menu-btn.open span::before {
    top: 0;
    transform: rotate(45deg);
}

.menu-btn.open span::after {
    top: 0;
    transform: rotate(-45deg);
}

.menu-links {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px 16px;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.topbar.open .menu-links {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

.menu-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 76px;
    height: 34px;
    padding: 0 16px;
    border: 1px solid rgba(52, 54, 45, 0.45);
    border-radius: 9px;
    color: var(--text);
    text-decoration: none;
    background: rgba(18, 19, 16, 0.35);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    font-size: 15px;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
}

.menu-link:hover {
    transform: translateY(-1px);
    border-color: var(--accent);
    background: rgba(185, 194, 157, 0.08);
}

.desktop-links {
    display: none;
    align-items: center;
    gap: 4px;
}

.desktop-link {
    padding: 8px 20px;
    border-radius: 9px;
    color: rgba(230, 230, 230, 0.55);
    text-decoration: none;
    font-size: 15px;
    letter-spacing: 0.3px;
    background: transparent;
    transition: color 0.2s ease, background 0.2s ease;
}

.desktop-link:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.07);
}

@media (min-width: 720px) {
    .topbar-wrap {
        top: 18px;
        border-radius: 15px;
    }

    .topbar {
        height: 54px;
    }

    .topbar.open {
        height: 54px;
    }

    .topbar-row {
        height: 54px;
        min-height: 54px;
        padding: 0 8px 0 18px;
    }

    .brand {
        font-size: 18px;
        gap: 10px;
    }

    .brand img {
        width: 28px;
        height: 28px;
    }

    .menu-btn {
        display: none;
    }

    .menu-links {
        display: none !important;
    }

    .desktop-links {
        display: flex;
    }
}

.container {
    text-align: center;
    padding: 24px;
}

.error-code {
    font-size: 80px;
    line-height: 1;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(185, 194, 157, 0.15);
    animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
}

.error-text {
    margin-top: 16px;
    font-size: 18px;
    color: rgba(230, 230, 230, 0.55);
    line-height: 1.6;
    animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
}

.error-text a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(185, 194, 157, 0.3);
    padding-bottom: 1px;
    transition: border-color 0.2s ease, color 0.2s ease;
}

.error-text a:hover {
    color: #d0d8b8;
    border-color: #d0d8b8;
}

@media (min-width: 720px) {
    .error-code {
        font-size: 120px;
        letter-spacing: 6px;
    }

    .error-text {
        margin-top: 20px;
        font-size: 22px;
    }
}

@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(24px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

a, button {
    -webkit-tap-highlight-color: transparent;
    outline: none;
}

a:focus-visible, button:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 2px;
}

.menu-btn:active {
    background: rgba(255, 255, 255, 0.1);
}

.menu-link:active {
    transform: scale(0.97);
    background: rgba(185, 194, 157, 0.12);
}
</style>
</head>
<body>
    <div class="topbar-wrap">
        <div class="topbar" id="topbar">
            <div class="topbar-row">
                <div class="brand">
                    <img src="https://getunx.cc/Assets/Logo.png?size=64" alt="UNXHub Logo">
                    <span>UNXHub</span>
                </div>
                <button class="menu-btn" id="menuBtn" type="button" aria-label="Open menu" aria-expanded="false">
                    <span></span>
                </button>
                <nav class="desktop-links">
                    <a class="desktop-link" href="https://getunx.cc/">Home</a>
                    <a class="desktop-link" href="https://getunx.cc/tos">Terms</a>
                    <a class="desktop-link" href="https://discord.gg/zpaMS8qUfB" target="_blank" rel="noopener">Discord</a>
                </nav>
            </div>
            <div class="menu-links" id="menuLinks">
                <a class="menu-link" href="https://getunx.cc/">Home</a>
                <a class="menu-link" href="https://getunx.cc/tos">Terms</a>
                <a class="menu-link" href="https://discord.gg/zpaMS8qUfB" target="_blank" rel="noopener">Discord</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="error-code">404?!</div>
        <div class="error-text">Well....., that just happened :p, but you can always go back <a href="https://getunx.cc/">Home</a>!</div>
    </div>

<script>
const topbar = document.getElementById("topbar");
const menuBtn = document.getElementById("menuBtn");

menuBtn.addEventListener("click", () => {
    const isOpen = topbar.classList.toggle("open");
    menuBtn.classList.toggle("open", isOpen);
    menuBtn.setAttribute("aria-expanded", String(isOpen));
});
</script>
</body>
</html>
